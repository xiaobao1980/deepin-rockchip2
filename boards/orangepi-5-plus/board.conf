#!/bin/bash
# Orange Pi 5 Plus - RK3588 Board Configuration

BOARD_NAME="Orange Pi 5 Plus"
SOC_CHIP="RK3588"
BOOT_LABEL="opi5proot"

# U-Boot Configuration
UBOOT_DEFCONFIG="orangepi-5-plus-rk3588_defconfig"
UBOOT_GIT_BRANCH="v2025.07"

# Rockchip Binary Blobs (from armbian/rkbin or rockchip-linux/rkbin)
RKBIN_DDR="rk35/rk3588_ddr_lp4_2112MHz_lp5_2400MHz_eyescan_v1.19.bin"
RKBIN_BL31="rk35/rk3588_bl31_v1.48.elf"

# Trusted Firmware A
TF_A_PLAT="rk3588"
TF_A_BRANCH="v2.13.0"

# Kernel Configuration
KERNEL_REPO="https://github.com/armbian/linux-rockchip"
KERNEL_BRANCH="rk-6.1-rkr5.1"
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
KERNEL_DTB="rk3588-orangepi-5-plus.dtb"
KERNEL_DTB_DIR="rockchip"

# Device Tree Overlays
DT_OVERLAYS="rockchip-rk3588-panthor-gpu.dtbo"
ENABLE_GPU_OVERLAY="yes"

# Serial Console
SERIAL_CONSOLE="ttyS2"
SERIAL_BAUD="1500000"

# Default settings
DEFAULT_ROOTFS_SIZE="8"
GPU_OVERLAY="yes"
DEFAULT_SOURCE_PROFILE="stable+hwe"  # HWE recommended for RK3588 GPU

# Extra packages for this board
EXTRA_PACKAGES=""
