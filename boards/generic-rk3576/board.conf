#!/bin/bash
# Generic RK3576 Board Configuration
# RK3576: 8-core Cortex-A53, Mali-G52 MC3 GPU, 6 TOPS NPU
# VPU: H.264/H.265 4K120 decode, H.264/H.265 4K60 encode, AV1 4K60 decode

BOARD_NAME="Generic RK3576"
SOC_CHIP="RK3576"
BOOT_LABEL="rk3576root"

UBOOT_DEFCONFIG="generic-rk3576_defconfig"
UBOOT_GIT_BRANCH="v2025.07"

RKBIN_DDR="rk35/rk3576_ddr_lp4_2112MHz_v1.04.bin"
RKBIN_BL31="rk35/rk3576_bl31_v1.03.elf"

TF_A_PLAT="rk3576"
TF_A_BRANCH="v2.13.0"

KERNEL_REPO="https://github.com/armbian/linux-rockchip"
KERNEL_BRANCH="rk-6.1-rkr5.1"
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
KERNEL_DTB="rk3576-evb.dtb"
KERNEL_DTB_DIR="rockchip"

# GPU overlay: Mali-G52 MC3 via panfrost (open-source driver)
# Armbian rk-6.1-rkr5.1 has full panfrost support for RK3576
DT_OVERLAYS="rockchip-rk3576-panfrost-gpu.dtbo"
ENABLE_GPU_OVERLAY="yes"

SERIAL_CONSOLE="ttyS2"
SERIAL_BAUD="1500000"

DEFAULT_ROOTFS_SIZE="8"
GPU_OVERLAY="yes"
DEFAULT_SOURCE_PROFILE="stable+hwe"

EXTRA_PACKAGES=""
