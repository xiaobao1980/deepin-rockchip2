#!/bin/bash
# Rock 5 ITX - RK3588 Board Configuration
# With Armbian config support example

BOARD_NAME="Rock 5 ITX"
SOC_CHIP="RK3588"
BOOT_LABEL="rock5itxroot"

# U-Boot Configuration
# U-Boot config selection (priority: high to low):
#   1. boards/rock-5-itx_uboot.config    (custom full .config)
#   2. boards/rock-5-itx.defconfig       (custom defconfig file)
#   3. make rock-5-itx-rk3588_defconfig  (standard U-Boot defconfig)
UBOOT_DEFCONFIG="rock-5-itx-rk3588_defconfig"
UBOOT_GIT_BRANCH="v2025.07"

# Rockchip Binary Blobs
RKBIN_DDR="rk35/rk3588_ddr_lp4_2112MHz_lp5_2400MHz_eyescan_v1.19.bin"
RKBIN_BL31="rk35/rk3588_bl31_v1.50.elf"

# Trusted Firmware A
TF_A_PLAT="rk3588"
TF_A_BRANCH="v2.13.0"

# Kernel Configuration
# Kernel config selection (priority: high to low):
#   1. kernel-configs/rock-5-itx.config or rock-5-itx_vendor.config
#      (custom full .config, copied directly + olddefconfig)
#   2. kernel-configs/rock-5-itx.defconfig
#      (custom defconfig fragment)
#   3. make rockchip_linux_defconfig
#      (Armbian/U-Boot standard defconfig from arch/arm64/configs/)
KERNEL_REPO="https://github.com/armbian/linux-rockchip"
KERNEL_BRANCH="rk-6.1-rkr5.1"
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
KERNEL_DTB="rk3588-rock-5-itx.dtb"
KERNEL_DTB_DIR="rockchip"

# Device Tree Overlays
DT_OVERLAYS="rockchip-rk3588-panthor-gpu.dtbo"
ENABLE_GPU_OVERLAY="yes"

# Serial Console
SERIAL_CONSOLE="ttyS2"
SERIAL_BAUD="1500000"

# Default settings
DEFAULT_ROOTFS_SIZE="12"
GPU_OVERLAY="yes"
DEFAULT_SOURCE_PROFILE="stable+hwe"

# Extra packages for this board
EXTRA_PACKAGES=""
