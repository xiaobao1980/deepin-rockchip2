#!/bin/bash
# NanoPC-T6 - RK3588 Board Configuration

BOARD_NAME="NanoPC-T6"
SOC_CHIP="RK3588"
BOOT_LABEL="npct6root"

UBOOT_DEFCONFIG="nanopc-t6-rk3588_defconfig"
UBOOT_GIT_BRANCH="v2025.07"

RKBIN_DDR="rk35/rk3588_ddr_lp4_2112MHz_lp5_2400MHz_eyescan_v1.19.bin"
RKBIN_BL31="rk35/rk3588_bl31_v1.48.elf"

TF_A_PLAT="rk3588"
TF_A_BRANCH="v2.13.0"

KERNEL_REPO="https://github.com/armbian/linux-rockchip"
KERNEL_BRANCH="rk-6.1-rkr5.1"
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
KERNEL_DTB="rk3588-nanopc-t6.dtb"
KERNEL_DTB_DIR="rockchip"

DT_OVERLAYS="rockchip-rk3588-panthor-gpu.dtbo"
ENABLE_GPU_OVERLAY="yes"
DEFAULT_SOURCE_PROFILE="stable+hwe"  # HWE recommended for RK3588 GPU

SERIAL_CONSOLE="ttyS2"
SERIAL_BAUD="1500000"

DEFAULT_ROOTFS_SIZE="8"
GPU_OVERLAY="yes"

EXTRA_PACKAGES=""
