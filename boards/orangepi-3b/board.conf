#!/bin/bash
# Orange Pi 3B - RK3566 Board Configuration

BOARD_NAME="Orange Pi 3B"
SOC_CHIP="RK3566"
BOOT_LABEL="opi3broot"

UBOOT_DEFCONFIG="orangepi-3b-rk3566_defconfig"
UBOOT_GIT_BRANCH="v2025.07"

RKBIN_DDR="rk35/rk3566_ddr_1056MHz_v1.23.bin"
RKBIN_BL31="rk35/rk3566_bl31_v1.44.elf"

TF_A_PLAT="rk3568"
TF_A_BRANCH="v2.13.0"

KERNEL_REPO="https://github.com/armbian/linux-rockchip"
KERNEL_BRANCH="rk-6.1-rkr5.1"
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
KERNEL_DTB="rk3566-orangepi-3b.dtb"
KERNEL_DTB_DIR="rockchip"

DT_OVERLAYS="rockchip-rk356x-panfrost-gpu.dtbo"
ENABLE_GPU_OVERLAY="yes"

SERIAL_CONSOLE="ttyS2"
SERIAL_BAUD="1500000"

DEFAULT_ROOTFS_SIZE="8"
GPU_OVERLAY="yes"
DEFAULT_SOURCE_PROFILE="stable+hwe"

EXTRA_PACKAGES=""
