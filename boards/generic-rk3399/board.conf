#!/bin/bash
# Generic RK3399 Board Configuration
# Note: RK3399 uses different U-Boot flow (no DDR blob needed)

BOARD_NAME="Generic RK3399"
SOC_CHIP="RK3399"
BOOT_LABEL="rk3399root"

UBOOT_DEFCONFIG="evb-rk3399_defconfig"
UBOOT_GIT_BRANCH="v2025.07"

# RK3399 does not need external DDR blob (DDR init is built into SPL)
RKBIN_DDR=""
# RK3399 BL31 from rockchip rkbin
RKBIN_BL31="rk33/rk3399_bl31_v1.35.elf"

TF_A_PLAT="rk3399"
TF_A_BRANCH="v2.13.0"

KERNEL_REPO="https://github.com/armbian/linux-rockchip"
KERNEL_BRANCH="rk-6.1-rkr5.1"
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
KERNEL_DTB="rk3399-evb.dtb"
KERNEL_DTB_DIR="rockchip"

DT_OVERLAYS=""
ENABLE_GPU_OVERLAY="no"

SERIAL_CONSOLE="ttyS2"
SERIAL_BAUD="1500000"

DEFAULT_ROOTFS_SIZE="8"
GPU_OVERLAY="no"

EXTRA_PACKAGES=""
